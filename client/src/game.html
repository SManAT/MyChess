<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyChess</title>
  <link rel="icon" href="/src/public/favicon.png">
</head>

<body>


  <nav class="navbar" style="background-color: #e3f2fd;" data-bs-theme="light">
    <div class="container-fluid">
      <!-- Logo on the left -->
      <a class="navbar-brand" href="#">
        <img src="/src/public/lobby.png" alt="Logo">
        Game Lobby
      </a>


      <div class="user-dropdown">
        <i id="online_icon" class="bi bi-database-fill-check"></i>
        <div id="navusername">
          <i class=" bi bi-person-circle user-icon"></i>
          <span>Username</span>
        </div>
        <a id="logout" href="#">
          Zurück
        </a>
      </div>
    </div>
  </nav>

  <div class="network_status offline hidden"></div>


  <div class="container-fluid">
    <div id="chess-area" class="row h-100">
      <div class="col-11 col-md-10 chess-board-wrapper">
        <div id="chessboard"></div>
      </div>
      <div id="gameInfo" class="col-1 col-md-2 game-info">

      </div>
    </div>
  </div>



  <script type="module" src="/src/entries/game.js"></script>
</body>

</html>

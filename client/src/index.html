<!DOCTYPE html>

<body>
  <div class="session">

      <div class="left">
        <img src="/src/public/logo.jpg" />
      </div>
      <form id="login_form" action="secured/auth.php" method="POST" class="log-in" autocomplete="off">
        <h4>Schach <span>Server</span></h4>
        <div class="floating-label">
          <input placeholder="Username" name="username" id="username" autocomplete="off">
        </div>
        <div class="floating-label">
          <input placeholder="Passwort" type="password" name="password" id="password" autocomplete="off">
          <div class="icon">

            <svg enable-background="new 0 0 24 24" version="1.1" viewBox="0 0 24 24" xml:space="preserve" xmlns="http://www.w3.org/2000/svg">
              <style type="text/css">
                .st0 {
                  fill: none;
                }

                .st1 {
                  fill: #010101;
                }
              </style>
              <rect class="st0" width="24" height="24" />
              <path class="st1" d="M19,21H5V9h14V21z M6,20h12V10H6V20z" />
              <path class="st1" d="M16.5,10h-1V7c0-1.9-1.6-3.5-3.5-3.5S8.5,5.1,8.5,7v3h-1V7c0-2.5,2-4.5,4.5-4.5s4.5,2,4.5,4.5V10z" />
              <path class="st1" d="m12 16.5c-0.8 0-1.5-0.7-1.5-1.5s0.7-1.5 1.5-1.5 1.5 0.7 1.5 1.5-0.7 1.5-1.5 1.5zm0-2c-0.3 0-0.5 0.2-0.5 0.5s0.2 0.5 0.5 0.5 0.5-0.2 0.5-0.5-0.2-0.5-0.5-0.5z" />
            </svg>
          </div>
        </div>
        <button type="submit" class="login">Anmelden</button>
      </form>
    </div>

    <div class="alert alert-primary mt-1" role="alert">
      <ul>
        <li>fdgdfg</li>
        <li>fdgdfg</li>
      </ul>
    </div>
    <div>
      <i class="bi bi-c-circle"></i> Mag. Stefan Hagmann
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>

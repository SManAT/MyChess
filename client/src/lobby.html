<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyChess</title>
  <link rel="icon" href="/src/public/favicon.png">
</head>

<body>
  <!-- Modal -->
  <div class="modal fade" id="newgameModal" tabindex="-1" aria-labelledby="newgameModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="newgameModalLabel">Neue Partie erstellen</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="newGameForm">
          <div class="modal-body">
            <div class="mb-3">
              <label for="game-name" class="form-label">
                Name der Partie
              </label>
              <input type="text" class="form-control" id="game-name" name="gameName" required placeholder="Spiel ...">
            </div>

            <!-- Player Selection with Search -->
            <div class="mb-3">
              <label for="player-select" class="form-label">
                <i class="bi bi-people me-2"></i>Spieler einladen
              </label>
              <div class="dropdown">
                <input type="text" class="form-control dropdown-toggle" id="player-search" data-bs-toggle="dropdown" placeholder="Suche Spieler ..." autocomplete="off">
                <ul class="dropdown-menu w-100" id="player-dropdown">
                  <!-- Players will be populated here -->
                </ul>
              </div>

              <!-- Selected Players Display -->
              <div id="selected-players" class="mt-2">
                <!-- Selected player badges will appear here -->
              </div>
            </div>

            <!-- Game Type (Optional) -->
            <div class="mb-3">
              <label for="game-type" class="form-label">
                <i class="bi bi-gear me-2"></i>Game Type
              </label>
              <select class="form-select" id="game-type" name="gameType">
                <option value="standard">Standard</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              <i class="bi bi-x-circle me-2"></i>Cancel
            </button>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-plus-circle me-2"></i>Create Game
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <nav class="navbar" style="background-color: #e3f2fd;" data-bs-theme="light">
    <div class="container-fluid">
      <!-- Logo on the left -->
      <a class="navbar-brand" href="#">
        <img src="/src/public/lobby.png" alt="Logo">
        Game Lobby
      </a>


      <!-- User dropdown on the right -->
      <div class="user-dropdown">
        <i id="online_icon" class="bi bi-database-fill-check"></i>
        <a href="#" role="button">
          <i class=" bi bi-person-circle user-icon"></i>
          <span>Username</span>
        </a>
        <a id="logout" href="#">
          <i class=" bi bi-person-circle user-icon"></i>
          Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="network_status offline hidden"></div>

  <div class="container mt-1">
    <div class="row">
      <div class="col-12 col-md-6 col-lg-6 offset-lg-0 mt-lg-4">
        <div class="d-flex justify-content-between">
          <span class="myh2">Meine Partien</span>
          <button id="game-add" type="button" class="btn btn-success">
            <i class="bi bi-plus-circle"></i>
            Neue Partie
          </button>
        </div>

        <div class="game-list mt-lg-3">
          <ul class="list-unstyled">
          </ul>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-4 offset-lg-2 mt-2 mt-lg-4">
        <h2>Spieler Online</h2>
        <div class="player-list mt-lg-3">
          <ul class="list-unstyled">
          </ul>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/entries/lobby.js"></script>
</body>

</html>
